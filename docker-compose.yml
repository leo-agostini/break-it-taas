    #     backend:
    #       condition: service_started

    backend:
        build:
            context: ./backend
            dockerfile: Dockerfile
        container_name: breakit-backend
        ports:
            - "3001:3001"
        environment:
            - NODE_ENV=production
            - PORT=3001
            - JWT_SECRET=change-me-in-production
            - JWT_REFRESH_SECRET=change-me-refresh-in-production
            - RUNNER_SHARED_SECRET=local-runner-shared-secret
            - RUNNER_CALLBACK_BASE_URL=http://localhost:3001
            - RUNNER_IMAGE=breakit-k6-runner:local
            - K3S_NAMESPACE=app
            - K3S_QUEUE_ENDPOINT=
            - DATABASE_URL=postgres://postgres:postgres@postgres:5432/app
        depends_on:
            migrate:
                condition: service_completed_successfully

    outbox-worker:
        build:
            context: ./backend
            dockerfile: Dockerfile
        container_name: breakit-outbox-worker
        environment:
            - NODE_ENV=production
            - JWT_SECRET=change-me-in-production
            - JWT_REFRESH_SECRET=change-me-refresh-in-production
            - RUNNER_SHARED_SECRET=local-runner-shared-secret
            - RUNNER_CALLBACK_BASE_URL=http://localhost:3001
            - RUNNER_IMAGE=breakit-k6-runner:local
            - K3S_NAMESPACE=app
            - K3S_QUEUE_ENDPOINT=
            - DATABASE_URL=postgres://postgres:postgres@postgres:5432/app
        command: ["bun", "run", "src/worker.ts"]
        depends_on:
            migrate:
                condition: service_completed_successfully

    migrate:
        build:
            context: ./backend
            dockerfile: Dockerfile
        container_name: breakit-migrate
        environment:
            - NODE_ENV=production
            - DATABASE_URL=postgres://postgres:postgres@postgres:5432/app
        command: ["bun", "run", "migrate:latest"]
        depends_on:
            postgres:
                condition: service_healthy

    postgres:
        image: postgres:16-alpine
        container_name: breakit-postgres
        environment:
            - POSTGRES_USER=postgres
            - POSTGRES_PASSWORD=postgres
            - POSTGRES_DB=app
        ports:
            - "5432:5432"
        volumes:
            - postgres-data:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U postgres -d app"]
            interval: 5s
            timeout: 5s
            retries: 10

volumes:
    postgres-data:
