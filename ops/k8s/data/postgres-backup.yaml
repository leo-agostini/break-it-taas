apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-backups
  namespace: data
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 10Gi
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: postgres-backup
  namespace: data
spec:
  schedule: "0 */6 * * *"
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: backup
              image: postgres:16
              imagePullPolicy: IfNotPresent
              env:
                - name: PGHOST
                  value: postgres.data.svc.cluster.local
                - name: PGPORT
                  value: "5432"
                - name: PGDATABASE
                  valueFrom:
                    secretKeyRef:
                      name: postgres-auth
                      key: POSTGRES_DB
                - name: PGUSER
                  valueFrom:
                    secretKeyRef:
                      name: postgres-auth
                      key: POSTGRES_USER
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: postgres-auth
                      key: POSTGRES_PASSWORD
              command:
                - /bin/sh
                - -ec
                - |
                  ts=$(date +%Y%m%d-%H%M%S)
                  target="/backups/${PGDATABASE}-${ts}.sql.gz"
                  pg_dump --clean --if-exists --no-owner --no-privileges "$PGDATABASE" | gzip > "$target"
                  ls -1t /backups/*.sql.gz | tail -n +8 | xargs -r rm -f
                  echo "backup saved at $target"
              volumeMounts:
                - name: backups
                  mountPath: /backups
          volumes:
            - name: backups
              persistentVolumeClaim:
                claimName: postgres-backups
