apiVersion: v1
kind: Secret
metadata:
  name: app-env
  namespace: app
type: Opaque
stringData:
  JWT_SECRET: <set-in-ci-or-shell>
  JWT_REFRESH_SECRET: <set-in-ci-or-shell>
  DATABASE_URL: <set-in-ci-or-shell>
  RUNNER_SHARED_SECRET: <set-in-ci-or-shell>
  COOKIE_SAMESITE: Lax
  COOKIE_SECURE: "false"
