apiVersion: apps/v1
kind: Deployment
metadata:
  name: load-target
  namespace: app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: load-target
  template:
    metadata:
      labels:
        app: load-target
    spec:
      containers:
        - name: load-target
          image: hashicorp/http-echo:1.0.0
          args:
            - "-listen=:8080"
            - "-text=ok"
          resources:
            requests:
              cpu: 75m
              memory: 80Mi
            limits:
              cpu: 100m
              memory: 160Mi
          ports:
            - containerPort: 8080
              name: http
---
apiVersion: v1
kind: Service
metadata:
  name: load-target
  namespace: app
spec:
  selector:
    app: load-target
  ports:
    - name: http
      port: 8080
      targetPort: http
