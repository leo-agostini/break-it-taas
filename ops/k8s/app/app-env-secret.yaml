apiVersion: v1
kind: Secret
metadata:
  name: app-env
  namespace: app
type: Opaque
stringData:
  JWT_SECRET: local-dev-secret-change-me
  JWT_REFRESH_SECRET: local-dev-refresh-secret-change-me
  DATABASE_URL: postgres://postgres:postgres@postgres.data.svc.cluster.local:5432/app
  RUNNER_SHARED_SECRET: local-runner-shared-secret
  COOKIE_SAMESITE: Lax
  COOKIE_SECURE: "false"
