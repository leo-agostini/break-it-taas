apiVersion: v1
kind: ServiceAccount
metadata:
  name: outbox-worker
  namespace: app
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: outbox-worker-job-publisher
  namespace: app
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: outbox-worker-job-publisher
  namespace: app
subjects:
  - kind: ServiceAccount
    name: outbox-worker
    namespace: app
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: outbox-worker-job-publisher
