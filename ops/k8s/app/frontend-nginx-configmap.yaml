apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-nginx-config
  namespace: app
data:
  default.conf: |
    upstream frontend_upstream {
      ip_hash;
      server frontend.app.svc.cluster.local:3000;
    }

    upstream backend_upstream {
      server backend.app.svc.cluster.local:80;
    }

    server {
      listen 80;
      server_name _;

      location = /api/docs {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://backend_upstream/docs;
      }

      location = /api/docs/json {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://backend_upstream/docs/json;
      }

      location /api/ {
        if ($request_method = OPTIONS) {
          add_header Access-Control-Allow-Origin $http_origin always;
          add_header Access-Control-Allow-Methods "GET,POST,OPTIONS" always;
          add_header Access-Control-Allow-Headers "Content-Type,Authorization,Cookie" always;
          add_header Access-Control-Allow-Credentials "true" always;
          add_header Vary "Origin" always;
          return 204;
        }
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://backend_upstream;
      }

      location / {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://frontend_upstream;
      }
    }
